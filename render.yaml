services:
  - type: web
    name: data-backup-restore-portal
    env: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: PORT
        value: "5000"
      - key: BACKUP_TEMP_DIR
        value: ./temp
